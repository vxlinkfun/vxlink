            margin: 0; padding: 0;

        .float-wa {

        .float-wa svg { width: 30px; height: 30px; fill: white; }

        .brand-sub { font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; color: #888; }

        /* Grid */
        .grid { display: grid; gap: 20px; width: 90%; max-width: 400px; }

        .card {
            background: var(--branco);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex; align-items: center; gap: 20px;
            text-decoration: none; color: var(--preto-texto);
            transition: 0.3s;
        }
        .card:hover { border-color: var(--rosa-closet); }

        .svg-icon { width: 30px; height: 30px; fill: var(--rosa-closet); }

        /* Compromisso */
        .compromisso { margin: 40px 0; text-align: center; width: 90%; max-width: 400px; }
        .tags { display: flex; flex-direction: column; gap: 10px; }
        
        .tag {

            padding: 10px 15px; border-radius: 50px;
            background: var(--branco); display: flex;
            align-items: center; justify-content: center; gap: 8px;
        }
        
        .mini-icon { width: 14px; height: 14px; stroke: #999; fill: none; stroke-width: 2; }

        .footer { margin-bottom: 40px; font-size: 0.7rem; color: #bbb; text-decoration: none; letter-spacing: 1px; }
